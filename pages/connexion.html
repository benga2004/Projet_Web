<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connexion à StageHub">
    <title>Connexion - StageHub</title>
    <link rel="stylesheet" href="../css/inscription.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-bar-left">3:03</div>
            <div class="status-bar-right">A B</div>
        </div>

        <header class="header">
            <div class="logo">
                <div class="logo-icon">Logo</div>
                <span>StageHub</span>
            </div>
            <button class="menu-icon" aria-label="Menu">☰</button>
        </header>

        <main class="content">
            <h1>Connectez-Vous</h1>

            <form action="#" method="POST">
                <fieldset>
                    <legend class="sr-only">Formulaire de connexion</legend>
                    
                    <div class="form-group">
                        <label for="email">Adresse E-mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn-submit">Connexion</button>
                </fieldset>

                <div class="forgot-password">
                    <a href="#forgot">Mot de passe oublié?</a>
                </div>

                <div class="signup-section">
                    <p>Vous n'avez pas de compte?</p>
                    <a href="inscription.html">Inscrivez-Vous</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
