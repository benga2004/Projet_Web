<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelles offres</title>
</head>

<header>
    <center><h1>Nouvelle offre, une futur aventure !</h1></center>
</header>
<body>
    <label for="enterpriseStatut"><b>Vous êtes...</b></label>
    <select id="enterpriseStatut">
        <option value="hasNoAccount">Entreprise non inscrite</option>
        <option value="hasAccount">Entreprise déjà inscrite</option>
    </select>
    <br><br>
    <div hidden>
    <label for="find_enterprise">Nom de l'entreprise : </label>
    <input type="text" id="enterpriseName" name="enterpriseName"><br><br>
    <button type="submit">Continuer</button>
    
    </div>

    <div >
        <h2>Créez un compte employeur</h2><br><br>
        <form>
            <label for="enterpriseName">Nom de l'entreprise *:</label><br>
            <input type="text" id="enterpriseName" name="enterpriseName"><br><br>

            <label for="firstname">Prénom *:</label><br>
            <input type="text" id="firstname" name="firstname"><br><br>

            <label for="lastname">Nom *:</label><br>
            <input type="text" id="lastname" name="lastname"><br><br>

            <label for="phoneNumber">Numéro de téléphone *:</label><br>
            <input type="tel" id="phoneNumber" name="phoneNumber"><br><br>

            <button type="submit">Continuer</button>

        </form>
        
    </div>

    
</body>
