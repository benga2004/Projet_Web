<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informations - nouvelle offre de stage</title>
</head>
<!--Il n'y a rien ici-->
<header>
    <h1>Informations de base</h1>
</header>
<body>
    <form>
        <label for="jobTitle">Intitulé du poste *:</label><br>
        <input type="text" id="jobTitle" required><br><br>

        <label for="mobilite">Mobilité du poste *:</label><br>
        <select id="mobilite">
            <option value="inPerson">En présentiel</option>
            <option value="fullTelework">Télétravail complet : aucun travail sur place demandé</option>
            <option value="hybridTelework">Travail hybride : travail sur place est requis</option>
            <option value="oftenMoving">Déplacements fréquents</option>
        </select><br><br>

        <label for="jobLocation" >Quel est le lieu du poste ? *:</label><br>
        <input type="text" id="jobLocation" name="location" placeholder="nom de rue ou code postal" required><br><br>
        <hr><br>

        <h1>Objectif de recrutement</h1><br>

        <label for="delai">Délai de recrutement pour ce poste *:</label><br>
        <select id="delai" required>
            <option value="delai1">1 à 3 jours</option>
            <option value="delai2">3 à 7 jours</option>
            <option value="delai3">1 à 2 semaines</option>
            <option value="delai4">2 à 4 semaines</option>
            <option value="delai5">Plus de 4 semaines</option>
        </select><br><br>

        <label for="numberOfJob">Nombre de personnes à embaucher en stage dans les 30 prochain jours *:</label><br>
        <input type="number" id="numberOfJob" value="1"><br><br>
        <hr><br>

        <h1>Détails du stage</h1><br>
        <label for="duration">Quelle est la durée du contrat ? *:</label><br>
        <input type="number" id="durationNumber" value="2">
        <select id="durationPeriod">
            <option value="month">Mois</option>
            <option value="week">Semaine(s)</option>
            <option value="day">jour(s)</option>
        </select><br><br>
        <hr><br>

        <h1>Salaire et avantages</h1>
        <h2>Salaire</h2><br>
        <label for="minSalary">Minimum (en euro):</label>
        <input type="number" id="minSalary" value="0"> <br><br>
        <label for="maxSalary">Maximum (en euro):</label>
        <input type="number" id="maxSalary">

        <br><br>

        <label for="frequence">Fréquence :</label>
        <select id="frequence">
            <option value="fMonth">Par mois</option>
            <option value="fWeek">Par semaine</option>
            <option value="fDay">Par jour</option>
            <option value="fHour">Par heure</option>
        </select><br>

        <br><br>
        <button type="submit">Continuer</button>

    </form>
</body>
</html>
